<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Drink Shoppe Admin</title><meta name="theme-color" content="#080c10" />
  <style>
    :root{--bg:#080c10;--surface:#0f1520;--border:rgba(255,255,255,.10);--line:rgba(255,255,255,.18);--ink:#dde8ff;--muted:#8ea1c9;--accent:#3af0a2;--accent3:#5bc8ff;--danger:#ff6f7b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
    .wrap{max-width:1180px;margin:0 auto;padding:22px 16px 28px}
    .top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-start}
    .title{font-size:clamp(34px,6vw,64px);font-weight:900;line-height:.95}.sub{font-size:20px;color:var(--muted);margin-top:10px}
    .btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:12px 18px;cursor:pointer;font-weight:700}
    .btn.green{border-color:rgba(58,240,162,.45);background:rgba(58,240,162,.12);color:var(--accent)} .btn.red{border-color:rgba(255,111,123,.45);background:rgba(255,111,123,.09);color:var(--danger)}
    .tabs{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0 18px}.tab{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#cfe0ff;border-radius:20px;padding:16px 22px;cursor:pointer;font-size:28px;font-weight:800}
    .tab.active{border-color:rgba(91,200,255,.55);background:rgba(91,200,255,.12);color:#8cd2ff}
    .add{background:rgba(58,240,162,.07);border:1px solid rgba(58,240,162,.28);border-radius:24px;padding:18px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;align-items:end}.grid.syrup{grid-template-columns:1.2fr 1.6fr 1.4fr auto}.grid.lotus{grid-template-columns:1.3fr .8fr 1.1fr 1.6fr 1.2fr auto}
    label{display:block;font-size:12px;letter-spacing:.12em;color:var(--muted);font-weight:800;margin-bottom:6px}
    input,select{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:14px 14px;color:#fff;font-size:18px;outline:none}
    .list{display:flex;flex-direction:column;gap:14px}.item{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:16px}
    .main{display:flex;gap:14px;align-items:center;min-width:0}.emoji{font-size:34px}.name{font-size:22px;font-weight:900}.meta{color:var(--muted);font-size:16px;margin-top:4px}
    .icon{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#fff;width:46px;height:46px;border-radius:14px;cursor:pointer;font-size:18px}.icon.red{border-color:rgba(255,111,123,.34);color:var(--danger)}
    .sw{position:relative;width:56px;height:32px}.sw input{display:none}.sw-track{position:absolute;inset:0;background:#dcdcdc;border:1px solid #fff;border-radius:999px}.sw-thumb{position:absolute;width:26px;height:26px;left:3px;top:3px;border-radius:50%;background:#fff;transition:transform .2s}
    .sw input:checked ~ .sw-track{background:rgba(58,240,162,.28);border-color:rgba(58,240,162,.75)} .sw input:checked ~ .sw-thumb{transform:translateX(24px);background:var(--accent)}
    .panel{display:none}.panel.active{display:block}.help{margin-top:10px;color:var(--muted);font-size:14px}
    @media (max-width:900px){.grid,.grid.syrup,.grid.lotus{grid-template-columns:1fr}.item{grid-template-columns:1fr auto auto auto}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><div class="title">Admin Settings</div><div class="sub">Manage bases, syrups, tags, and Lotus pairings</div></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn" id="backBtn">← Back</button><button class="btn red" id="resetDefaultsBtn">Reset to defaults</button></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="syrups">🍯 Syrups</button>
    <button class="tab" data-tab="bases">🥤 Bases</button>
    <button class="tab" data-tab="lotus">⚡ Lotus</button>
  </div>

  <section class="panel active" id="panel-syrups">
    <div class="add">
      <div class="grid syrup">
        <div><label>Syrup name</label><input id="addSyrupLabel" placeholder="New syrup name"></div>
        <div><label>Vibe words</label><input id="addSyrupVibes" placeholder="Bright, Sweet, Tropical"></div>
        <div><label>Tags</label><input id="addSyrupTags" placeholder="berry, citrus, tropical"></div>
        <button class="btn green" id="addSyrupBtn">+ Add</button>
      </div>
      <div class="help">Vibe words drive drink names. Tags drive Lotus pairing.</div>
    </div>
    <div class="list" id="syrupsList"></div>
  </section>

  <section class="panel" id="panel-bases">
    <div class="add">
      <div class="grid">
        <div><label>Base name</label><input id="addBaseLabel" placeholder="Base name"></div>
        <div><label>Alias</label><input id="addBaseAlias" placeholder="Short alias"></div>
        <div><label>Category</label><select id="addBaseCategory"></select></div>
        <div><label>Emoji</label><input id="addBaseEmoji" placeholder="🥤"></div>
        <button class="btn green" id="addBaseBtn">+ Add</button>
      </div>
      <div class="help">Alias is the short word used in drink names.</div>
    </div>
    <div class="list" id="basesList"></div>
  </section>

  <section class="panel" id="panel-lotus">
    <div class="add">
      <div class="grid lotus">
        <div><label>Lotus name</label><input id="addLotusLabel" placeholder="Pink Lotus"></div>
        <div><label>Family</label><input id="addLotusFamily" placeholder="pink"></div>
        <div><label>Color</label><input id="addLotusColor" placeholder="pink"></div>
        <div><label>Pairs well with</label><input id="addLotusPairs" placeholder="berry, citrus, tropical"></div>
        <div><label>Vibe words</label><input id="addLotusVibes" placeholder="Glow, Neon, Bright"></div>
        <button class="btn green" id="addLotusBtn">+ Add</button>
      </div>
      <div class="help">Lotus options are only used with Chill and Fizz bases. Pairing tags should match syrup tags.</div>
    </div>
    <div class="list" id="lotusList"></div>
  </section>
</div>
<script src="admin.js"></script>
</body>
</html>
